<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ISA Saúde — Portal do Captador</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root{--navy:#004474;--pink:#ED1E79;--cyan:#09D4D7;--dark:#002e50;--mid:#00335a;--border:rgba(9,212,215,.15)}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:Inter,Arial,sans-serif;background:var(--dark);color:#fff} button,input,select{font:inherit;outline:none} option{background:var(--dark);color:#fff}
    .login{min-height:100vh;display:grid;place-items:center;padding:20px}.card{background:var(--mid);border:1px solid var(--border);border-radius:14px;padding:24px}.login .card{width:min(440px,100%);box-shadow:0 24px 80px rgba(0,0,0,.35)}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}.logo{width:54px;height:54px;object-fit:contain;display:block;background:transparent}.login .logo{width:76px;height:76px}.muted{color:rgba(255,255,255,.4);font-size:13px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}.tab{border:1px solid var(--border);border-radius:8px;padding:10px;background:transparent;color:rgba(255,255,255,.48);font-weight:800;cursor:pointer}.tab.active{background:rgba(237,30,121,.18);border-color:var(--pink);color:#fff}
    label{display:block}.label{display:block;color:rgba(255,255,255,.45);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}.field{display:grid;gap:14px}.input{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:#fff}.btn{border:0;border-radius:10px;padding:12px 18px;background:linear-gradient(135deg,var(--pink),#b5155f);color:#fff;font-weight:800;cursor:pointer;display:inline-flex;gap:8px;align-items:center}.btn:disabled{opacity:.6;cursor:not-allowed}.ghost{background:rgba(9,212,215,.08);border:1px solid var(--border);color:var(--cyan);border-radius:8px;padding:7px 10px;font-size:12px;font-weight:800;cursor:pointer}.ghost:disabled{opacity:.35;cursor:not-allowed}
    .app{min-height:100vh}.side{position:fixed;inset:0 auto 0 0;width:258px;background:linear-gradient(180deg,var(--mid),var(--dark));border-right:1px solid var(--border);padding:24px 12px;display:flex;flex-direction:column}.side .brand{padding:0 8px}.userbox{margin:0 4px 18px;padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:rgba(9,212,215,.07)}.nav{display:grid;gap:4px;flex:1}.nav button{display:flex;align-items:center;justify-content:space-between;text-align:left;background:transparent;border:1px solid transparent;color:rgba(255,255,255,.45);border-radius:10px;padding:11px 14px;font-weight:800;cursor:pointer}.nav button.active{background:rgba(237,30,121,.13);border-color:rgba(237,30,121,.28);color:var(--pink)}.main{margin-left:258px;padding:36px}.wrap{max-width:1180px}.title{margin-bottom:28px}.title h2{font-size:22px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.metrics{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:12px;margin-bottom:20px}.metric{cursor:pointer;text-align:left}.metric.active{border-color:var(--pink);box-shadow:0 0 0 1px rgba(237,30,121,.2),0 12px 30px rgba(0,0,0,.16)}.metric .value{font-size:28px;font-weight:900}.panel{background:var(--mid);border:1px solid var(--border);border-radius:14px;padding:20px}.wide{grid-column:1/-1}.eyebrow{color:rgba(255,255,255,.45);font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
    table{width:100%;border-collapse:collapse;min-width:980px} th{background:var(--dark);padding:12px 14px;text-align:left;color:rgba(255,255,255,.35);font-size:10px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}td{padding:13px 14px;border-bottom:1px solid var(--border);color:rgba(255,255,255,.62);font-size:12px;vertical-align:middle}.strong{color:#fff;font-weight:800;font-size:13px}.badge{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:800;white-space:nowrap;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#94a3b8}.badge.pos{background:rgba(9,212,215,.12);border-color:rgba(9,212,215,.28);color:var(--cyan)}.badge.neg{background:rgba(237,30,121,.12);border-color:rgba(237,30,121,.28);color:var(--pink)}.badge.warn{background:rgba(255,184,0,.12);border-color:rgba(255,184,0,.28);color:#f5b642}.toast{position:fixed;right:28px;bottom:28px;background:var(--mid);border:1px solid var(--cyan);border-radius:12px;padding:14px 20px;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:99;max-width:360px}.toast.err{border-color:var(--pink)}.bar{height:10px;background:rgba(255,255,255,.08);border-radius:20px;overflow:hidden}.bar span{display:block;height:100%}
    @media(max-width:900px){.side{position:static;width:auto}.main{margin-left:0;padding:22px}.grid,.metrics{grid-template-columns:1fr}.wide{grid-column:auto}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAwlUEXma7d59MoCz4-2cYUOwggOY9NjSMKu36oxPPXG5jA0QeGodvQ9CUZWMB_SYg/exec";
    const LOGO_SRC = "isa-logo.png";
    const SESSION_KEY = "isa_captacoes_session_v4";
    const ESPECIALIDADES = ["Técnico de Enfermagem","Auxiliar de Enfermagem","Enfermagem","Fisioterapeuta","Fonoaudiólogo","Nutricionista","Psicólogo","Médico","Terapeuta Ocupacional"];
    const FAIXAS = [
      {nome:"Bronze",inicio:1,ate:30,taxa:20,cor:"#cd7f32"},
      {nome:"Prata",inicio:31,ate:65,taxa:30,cor:"#a8a9ad"},
      {nome:"Ouro",inicio:66,ate:200,taxa:40,cor:"#f5c518"}
    ];
    let state = { user:null, token:"", page:"cadastro", profissionais:[], toast:null, loginMode:"login", loading:false, search:"", filter:"todos", sim:60 };
    const $ = sel => document.querySelector(sel);
    const fmtR = v => Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
    const phoneKey = v => String(v||"").replace(/\D/g,"").slice(0,11);
    const formatTel = v => { const n=phoneKey(v); if(n.length<=2)return n?`(${n}`:""; if(n.length<=7)return`(${n.slice(0,2)}) ${n.slice(2)}`; return`(${n.slice(0,2)}) ${n.slice(2,7)}-${n.slice(7)}`; };
    const calc = n => FAIXAS.reduce((sum,f)=>sum+Math.max(0,Math.min(n,f.ate)-f.inicio+1)*f.taxa,0);
    const esc = v => String(v ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    async function api(body){
      if(SCRIPT_URL.includes("COLE_AQUI")) throw new Error("Configure a URL do novo Web App do Apps Script no HTML.");
      const res = await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(body)});
      const data = await res.json();
      if(!data.sucesso) throw new Error(data.erro || "Erro no Apps Script.");
      return data;
    }
    function toast(msg,type="ok"){ state.toast={msg,type}; render(); setTimeout(()=>{state.toast=null; render()},3800); }
    function saveSession(){ localStorage.setItem(SESSION_KEY,JSON.stringify({user:state.user,token:state.token})); }
    function loadSession(){ try{ const s=JSON.parse(localStorage.getItem(SESSION_KEY)||"null"); if(s){state.user=s.user; state.token=s.token;} }catch{} }
    function logout(){ localStorage.removeItem(SESSION_KEY); state={...state,user:null,token:"",profissionais:[],page:"cadastro"}; render(); }
    async function refresh(){ if(!state.token)return; state.loading=true; render(); try{ const r=await api({action:"getProfissionais",token:state.token}); state.profissionais=r.profissionais||[]; }catch(e){ toast(e.message,"err"); } state.loading=false; render(); }

    function render(){
      const app = document.getElementById("app");
      if(!state.user){ app.innerHTML = loginHtml(); bindLogin(); return; }
      app.innerHTML = appHtml();
      bindApp();
    }
    function loginHtml(){
      return `<main class="login"><section class="card"><div class="brand"><img class="logo" src="${LOGO_SRC}" alt="ISA Saúde"><div><h1>Portal do Captador</h1><p class="muted">ISA Saúde</p></div></div>
        <div class="tabs"><button class="tab ${state.loginMode==="login"?"active":""}" data-mode="login">Entrar</button><button class="tab ${state.loginMode==="first"?"active":""}" data-mode="first">Definir senha</button></div>
        <div class="field">${state.loginMode==="first"?field("Nome","nome","Seu nome"):""}${field("E-mail","email","email@empresa.com")} ${field(state.loginMode==="first"?"Nova senha":"Senha","senha","Digite sua senha","password")}
        <button class="btn" id="loginBtn">${state.loginMode==="first"?"Criar senha":"Entrar"}</button></div></section>${toastHtml()}</main>`;
    }
    function field(label,id,ph,type="text"){ return `<label><span class="label">${label}</span><input class="input" id="${id}" type="${type}" placeholder="${ph}"></label>`; }
    function bindLogin(){
      document.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>{state.loginMode=b.dataset.mode;render()});
      $("#loginBtn").onclick = async () => {
        try{
          const body={action:state.loginMode==="first"?"setPassword":"login",email:$("#email").value.trim(),senha:$("#senha").value,nome:$("#nome")?.value.trim()||""};
          const r=await api(body); state.user=r.user; state.token=r.token; saveSession(); toast("Login realizado."); await refresh();
        }catch(e){ toast(e.message,"err"); }
      };
    }
    function appHtml(){
      const nav=[["cadastro","Cadastrar"],["profissionais","Meus Profissionais"],["ganhos","Resumo de Ganhos"],["simulacao","Simulação"]];
      if(state.user.role==="admin") nav.push(["admin","Admin"]);
      return `<div class="app"><aside class="side"><div class="brand"><img class="logo" src="${LOGO_SRC}" alt="ISA Saúde"><div><strong>ISA Saúde</strong><p class="muted">Portal do Captador</p></div></div><div class="userbox"><strong>${esc(state.user.nome)}</strong><p class="muted">${state.user.role==="admin"?"ADMIN":"CAPTADOR"}</p></div><nav class="nav">${nav.map(([id,label])=>`<button data-page="${id}" class="${state.page===id?"active":""}"><span>${label}</span>${id==="profissionais"?`<small>${state.profissionais.length}</small>`:""}</button>`).join("")}</nav><button class="ghost" id="logout">Sair</button></aside><main class="main"><div class="wrap">${state.loading?`<p class="muted" style="margin-bottom:16px">Atualizando dados da planilha...</p>`:""}${pageHtml()}</div></main>${toastHtml()}</div>`;
    }
    function pageHtml(){
      if(state.page==="cadastro") return cadastroHtml();
      if(state.page==="profissionais") return profissionaisHtml();
      if(state.page==="ganhos") return ganhosHtml(state.profissionais.filter(isCadastroPositivo).length,"Resumo de Ganhos","Contabiliza apenas profissionais com Cadastro Realizado positivo.");
      if(state.page==="simulacao") return simulacaoHtml();
      if(state.page==="admin") return adminHtml();
      return "";
    }
    function title(t,s){ return `<div class="title"><h2>${t}</h2><p class="muted">${s}</p></div>`; }
    function cadastroHtml(){
      return `${title("Cadastrar Profissional",`Responsável: ${esc(state.user.nome)}`)}<section class="card grid"><label class="wide"><span class="label">Nome completo</span><input class="input" id="nomeProf"></label><label><span class="label">Telefone</span><input class="input" id="telefone" inputmode="numeric"></label><label><span class="label">Especialidade</span><select class="input" id="especialidade"><option value="">Selecione...</option>${ESPECIALIDADES.map(e=>`<option>${e}</option>`).join("")}</select></label><label class="wide"><span class="label">Cidade</span><input class="input" id="cidade"></label><button class="btn" id="salvarProf">Identificar profissional</button></section>`;
    }
    function profissionaisHtml(){
      const list=state.profissionais.filter(p=>matchesSearch(p)&&matchesCardFilter(p));
      const c={i:state.profissionais.length,a:state.profissionais.filter(p=>p.status==="Abordado").length,p:state.profissionais.filter(isCadastroPositivo).length,n:state.profissionais.filter(p=>!isCadastroPositivo(p)).length};
      return `${title("Meus Profissionais","Funil de identificação, abordagem e retorno do cadastro.")}<div class="metrics">${metric("Identificados",c.i,"","todos")}${metric("Abordados",c.a,"","abordado")}${metric("Cadastrados",c.p,"pos","cadastrado")}${metric("Não cadastrados",c.n,"neg","nao-cadastrado")}</div><input class="input" id="search" value="${esc(state.search)}" placeholder="Buscar..." style="margin-bottom:18px"><div class="card" style="overflow:auto;padding:0"><table><thead><tr>${["Nome","Telefone","Especialidade","Cidade","Funil","Abordagem","Cadastro","Datas","Ações"].map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${list.map(rowHtml).join("")||`<tr><td colspan="9" style="text-align:center;padding:36px">Nenhum profissional encontrado.</td></tr>`}</tbody></table></div>`;
    }
    function rowHtml(p){
      const cad=isCadastroPositivo(p);
      return `<tr><td class="strong">${esc(p.nome)}</td><td>${esc(p.telefone)}</td><td>${esc(p.especialidade)}</td><td>${esc(p.cidade)}</td><td>${badge(p.status||"Identificado",p.status==="Abordado"?"warn":"")}</td><td>${badge(p.respostaAbordagem||"Sem resposta",p.respostaAbordagem==="Positiva"?"pos":p.respostaAbordagem==="Negativa"?"neg":"")}</td><td>${badge(cad?"Cadastrado":"Não cadastrado",cad?"pos":"")}</td><td><div>Identificação: ${esc(p.dataIdentificacao||"—")}</div><div>Abordagem: ${esc(p.dataAbordagem||"—")}</div><div>Interesse: ${esc(p.dataInteresse||"—")}</div><div>Cadastro: ${esc(p.dataCadastro||"—")}</div></td><td><button class="ghost" data-step="abordado" data-phone="${esc(p.telefone)}" ${p.dataAbordagem?"disabled":""}>Abordado</button> <button class="ghost" data-step="positiva" data-phone="${esc(p.telefone)}">Positiva</button> <button class="ghost" data-step="negativa" data-phone="${esc(p.telefone)}">Negativa</button></td></tr>`;
    }
    function metric(label,value,tone="",filter="todos"){ return `<button class="panel metric ${state.filter===filter?"active":""}" data-filter="${filter}"><div class="value" style="color:${tone==="pos"?"var(--cyan)":tone==="neg"?"var(--pink)":"#fff"}">${value}</div><div class="muted">${label}</div></button>`; }
    function isCadastroPositivo(p){ return p?.statusCadastro==="Positivo" || p?.cadastroRealizado==="Positivo"; }
    function matchesSearch(p){ return [p.nome,p.telefone,p.especialidade,p.cidade,p.status,p.statusCadastro,p.cadastroRealizado].some(v=>String(v||"").toLowerCase().includes(state.search.toLowerCase())); }
    function matchesCardFilter(p){
      if(state.filter==="abordado") return p.status==="Abordado";
      if(state.filter==="cadastrado") return isCadastroPositivo(p);
      if(state.filter==="nao-cadastrado") return !isCadastroPositivo(p);
      return true;
    }
    function badge(text,tone=""){ return `<span class="badge ${tone}">${esc(text)}</span>`; }
    function ganhosHtml(total,t,s){
      return `${title(t,s)}<div class="grid"><section class="card"><p class="eyebrow">Montante a receber</p><p style="font-size:38px;font-weight:900">${fmtR(calc(total))}</p></section><section class="card"><p class="eyebrow">Cadastros positivos</p><p style="font-size:48px;font-weight:900;color:var(--cyan)">${total}</p></section></div>${faixasHtml(total)}`;
    }
    function simulacaoHtml(){
      return `${title("Simulação de Ganhos","Arraste para estimar a remuneração por quantidade de profissionais.")}<section class="card"><p class="eyebrow">Quantidade simulada</p><input id="simRange" type="range" min="0" max="200" value="${state.sim}" style="width:100%;accent-color:var(--pink)"><p style="font-size:44px;font-weight:900;color:var(--cyan);margin-top:12px">${state.sim}</p><p class="eyebrow" style="margin-top:20px">Total simulado</p><p style="font-size:38px;font-weight:900">${fmtR(calc(state.sim))}</p></section>${faixasHtml(state.sim)}`;
    }
    function faixasHtml(total){
      return `<section class="card" style="margin-top:20px"><p class="eyebrow">Detalhamento por faixa</p>${FAIXAS.map(f=>{const q=Math.max(0,Math.min(total,f.ate)-f.inicio+1), pct=q/(f.ate-f.inicio+1)*100; return `<div style="display:grid;grid-template-columns:110px 1fr 120px;gap:12px;align-items:center;margin:10px 0"><strong style="color:${f.cor}">${f.nome}</strong><div class="bar"><span style="width:${pct}%;background:${f.cor}"></span></div><small>${q} x ${fmtR(f.taxa)}</small></div>`}).join("")}</section>`;
    }
    function adminHtml(){
      return `${title("Admin","Criação dos acessos individuais do portal.")}<section class="card grid"><label><span class="label">Nome</span><input class="input" id="userNome"></label><label><span class="label">E-mail</span><input class="input" id="userEmail"></label><button class="btn wide" id="createUser">Criar acesso</button></section><section class="card" style="margin-top:20px"><p class="eyebrow">Usuários</p><div id="usersList"><button class="ghost" id="loadUsers">Carregar usuários</button></div></section>`;
    }
    function toastHtml(){ return state.toast?`<div class="toast ${state.toast.type==="err"?"err":""}">${esc(state.toast.msg)}</div>`:""; }
    function bindApp(){
      document.querySelectorAll("[data-page]").forEach(b=>b.onclick=()=>{state.page=b.dataset.page;render()});
      document.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;render()});
      $("#logout").onclick=logout;
      if($("#salvarProf")) $("#salvarProf").onclick=saveProf;
      if($("#search")) $("#search").oninput=e=>{state.search=e.target.value;render()};
      document.querySelectorAll("[data-step]").forEach(b=>b.onclick=()=>updateFunil(b.dataset.phone,b.dataset.step));
      if($("#simRange")) $("#simRange").oninput=e=>{state.sim=Number(e.target.value);render()};
      if($("#createUser")) $("#createUser").onclick=createUser;
      if($("#loadUsers")) $("#loadUsers").onclick=loadUsers;
    }
    async function saveProf(){
      const dados={nome:$("#nomeProf").value.trim(),telefone:formatTel($("#telefone").value),especialidade:$("#especialidade").value,cidade:$("#cidade").value.trim()};
      if(!dados.nome||phoneKey(dados.telefone).length<10||!dados.especialidade||!dados.cidade) return toast("Preencha todos os campos corretamente.","err");
      try{ await api({action:"addProfissional",token:state.token,dados}); toast("Profissional identificado."); await refresh(); }catch(e){ toast(e.message,"err"); }
    }
    async function updateFunil(telefone,etapa){ try{ await api({action:"updateFunil",token:state.token,telefone,etapa}); toast("CRM atualizado."); await refresh(); }catch(e){ toast(e.message,"err"); } }
    async function createUser(){ try{ await api({action:"adminCreateUser",token:state.token,nome:$("#userNome").value.trim(),email:$("#userEmail").value.trim()}); toast("Usuário criado."); }catch(e){ toast(e.message,"err"); } }
    async function loadUsers(){ try{ const r=await api({action:"listUsers",token:state.token}); $("#usersList").innerHTML=(r.users||[]).map(u=>`<p style="padding:8px 0;border-bottom:1px solid var(--border)"><strong>${esc(u.nome)}</strong><br><span class="muted">${esc(u.email)} — ${u.hasPassword?"Ativo":"Senha pendente"}</span></p>`).join(""); }catch(e){ toast(e.message,"err"); } }
    loadSession(); render(); if(state.token) refresh();
  </script>
</body>
</html>
